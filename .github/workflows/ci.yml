name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Django checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: satgrinder
          POSTGRES_USER: satgrinder
          POSTGRES_PASSWORD: satgrinder
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U satgrinder -d satgrinder"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      DATABASE_URL: postgres://satgrinder:satgrinder@localhost:5432/satgrinder

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Check formatting
        run: ruff format --check .

      #- name: Check templates
      #  run: djlint templates core/templates --check

      - name: Lint
        run: ruff check .

      - name: Check Django project
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test
