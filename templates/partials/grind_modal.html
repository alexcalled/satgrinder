<div class="modal-backdrop">
    <section class="grind-modal" role="dialog" aria-modal="true" aria-labelledby="grind-modal-title">

        <button
            type="button"
            class="modal-close-button"
            aria-label="Close modal"
            hx-get="{% url 'grind_modal_close' %}"
            hx-target="closest .modal-backdrop"
            hx-swap="delete"
        >
            ×
        </button>

        <p class="eyebrow">{{ mode_label }} Grind</p>

        <h2 id="grind-modal-title">
            Start {{ mode_label }} practice?
        </h2>

        <p>
            All questions are multiple-choice with four answer choices. Each question has a single best answer.
            Use of a calculator is permitted for all questions. A reference sheet and calculator can be accessed 
            in the top bar.
        </p>

        <div class="modal-actions">
            <button
                type="button"
                class="modal-secondary-button"
                hx-get="{% url 'grind_modal_close' %}"
                hx-target="closest .modal-backdrop"
                hx-swap="delete"
            >
                Cancel
            </button>

            <a href="#" class="modal-continue-button">
                Continue
            </a>
        </div>

    </section>
</div>
