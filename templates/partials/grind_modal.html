<div class="modal-backdrop">
    <section class="grind-modal" role="dialog" aria-modal="true" aria-labelledby="grind-modal-title">

        <button
            type="button"
            class="modal-close-button"
            aria-label="Close modal"
            hx-get="{% url 'grind:close_modal' %}"
            hx-target="#modal-root"
            hx-swap="innerHTML"
        >
            ×
        </button>

        <p class="eyebrow">{{ category_name }} Grind</p>

        <h2 id="grind-modal-title">
            Start {{ category_name }} practice?
        </h2>

        <p>
            This session will pull questions from every active skill under the
            {{ category_name }} category.
        </p>

        <form
            method="post"
            action="{% url 'grind:start_category' category_slug %}"
            class="modal-actions"
        >
            {% csrf_token %}

            <button
                type="button"
                class="modal-secondary-button"
                hx-get="{% url 'grind:close_modal' %}"
                hx-target="#modal-root"
                hx-swap="innerHTML"
            >
                Cancel
            </button>

            <button type="submit" class="modal-continue-button">
                Continue
            </button>
        </form>

    </section>
</div>
